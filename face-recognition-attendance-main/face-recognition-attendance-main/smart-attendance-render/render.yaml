services:
  - type: web
    name: smart-attendance
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-attendance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FACE_MATCH_TOLERANCE
        value: "0.5"

databases:
  - name: smart-attendance-db
    plan: free
    databaseName: smart_attendance
    user: attendance_user
