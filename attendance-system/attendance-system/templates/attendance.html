{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-body text-center">
                <h4>Live Attendance</h4>
                <p class="text-muted">Stand in front of the camera to get recognized automatically.</p>

                <div class="video-wrap">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                </div>

                <div id="result" class="mt-3 fs-5"></div>
                <div id="log" class="mt-4 text-start"></div>
            </div>
        </div>
    </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const result = document.getElementById('result');
const log = document.getElementById('log');

navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { result.innerText = "Camera access denied: " + err; });

function tick() {
    if (video.videoWidth === 0) { setTimeout(tick, 500); return; }
    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const imageData = canvas.toDataURL('image/jpeg', 0.8);

    fetch('/mark', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageData })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            if (data.already_marked) {
                result.innerHTML = `<span class="text-info">✔ ${data.name} (${data.roll}) already marked today</span>`;
            } else {
                result.innerHTML = `<span class="text-success">✅ Marked: ${data.name} (${data.roll})</span>`;
                const entry = document.createElement('div');
                entry.className = "alert alert-success py-1 px-2";
                entry.innerText = `${new Date().toLocaleTimeString()} — ${data.name} (${data.roll})`;
                log.prepend(entry);
            }
        } else {
            result.innerHTML = `<span class="text-muted">${data.message}</span>`;
        }
        setTimeout(tick, 1500);
    })
    .catch(() => setTimeout(tick, 1500));
}

video.addEventListener('loadeddata', () => setTimeout(tick, 500));
</script>
{% endblock %}
